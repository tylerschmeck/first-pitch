name: Sweep job boards

on:
  schedule:
    - cron: "17 */6 * * *"   # every 6 hours
  workflow_dispatch: {}       # manual "Run workflow" button

permissions:
  contents: write

concurrency:
  group: sweep
  cancel-in-progress: false

jobs:
  sweep:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r scraper/requirements.txt

      - name: Sweep all job boards
        run: python scraper/sweep.py

      - name: Commit refreshed data
        run: |
          git config user.name "first-pitch-bot"
          git config user.email "actions@users.noreply.github.com"
          git add docs/data/jobs.json
          if git diff --cached --quiet; then
            echo "No changes this sweep."
          else
            git commit -m "sweep: refresh job listings"
            git push
          fi
